name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # -------------------- ETAP 1: JAKOŚĆ KODU I TESTY (CI) --------------------
  quality-and-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Dopasuj do swojej wersji Pythona
          cache: 'pip'           # MAGIA: Automatyczny cache dla pobranych paczek (przyspiesza pipeline!)

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest  # Dodatkowe narzędzia do testów i lintera

      - name: Lint and Format with Ruff
        run: |
          # Ruff to obecnie najszybszy linter/formatter w świecie Pythona (pisany w Rust)
          ruff check .
          ruff format --check .

      - name: Run Tests
        run: |
          pytest
